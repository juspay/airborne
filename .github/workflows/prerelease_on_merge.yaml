name: Build prerelease artifacts on PR merge

on:
  pull_request:
    types: [closed]
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.merge_commit_sha || github.run_id }}
  cancel-in-progress: true

jobs:
  prepare-prerelease-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'main'
    outputs:
      version: ${{ steps.version.outputs.version }}
      tracking_tag: ${{ steps.version.outputs.tracking_tag }}
      build_sha: ${{ steps.version.outputs.build_sha }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ssh-key: ${{ secrets.AIRBORNE_DEPLOY_KEY }}

      - name: Compute prerelease version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          git fetch origin main --tags --force

          stable_tag=$(git tag | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -n 1 || true)
          if [ -z "${stable_tag}" ]; then
            stable_tag="v0.0.0"
          fi

          stable_version=${stable_tag#v}
          IFS='.' read -r major minor patch <<< "${stable_version}"
          next_patch=$((patch + 1))
          base_version="${major}.${minor}.${next_patch}"

          build_sha="${{ github.event.pull_request.merge_commit_sha }}"
          if [ -z "${build_sha}" ]; then
            build_sha=$(git rev-parse origin/main)
          fi

          short_sha=$(git rev-parse --short=12 "${build_sha}")
          version="${base_version}-${short_sha}"
          tracking_tag="prerelease-v${version}"

          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tracking_tag=${tracking_tag}" >> "$GITHUB_OUTPUT"
          echo "build_sha=${build_sha}" >> "$GITHUB_OUTPUT"

      - name: Create prerelease tracking tag
        shell: bash
        run: |
          set -euo pipefail

          tracking_tag="${{ steps.version.outputs.tracking_tag }}"
          build_sha="${{ steps.version.outputs.build_sha }}"

          if git rev-parse "${tracking_tag}" >/dev/null 2>&1; then
            echo "Tracking tag ${tracking_tag} already exists"
            exit 0
          fi

          git config user.email "airborne_bot@juspay.in"
          git config user.name "Airborne Bot"
          git tag "${tracking_tag}" "${build_sha}"
          git push origin "${tracking_tag}"

  server-docker-build:
    needs: prepare-prerelease-version
    permissions:
      contents: read
      packages: write
    if: needs.prepare-prerelease-version.outputs.version != ''
    strategy:
      max-parallel: 5
      matrix:
        include:
          - platform: linux/amd64
            tag: linux-amd64
            os: ubuntu-latest
          - platform: linux/arm64
            tag: linux-arm64
            os: ubuntu-24.04-arm
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-prerelease-version.outputs.build_sha }}
          fetch-depth: 0
          ssh-key: ${{ secrets.AIRBORNE_DEPLOY_KEY }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          push: true
          context: .
          file: airborne_server/Dockerfile
          tags: ghcr.io/${{ github.repository }}-server:${{ needs.prepare-prerelease-version.outputs.version }}-${{ matrix.tag }}

  server-create-manifest:
    needs: [prepare-prerelease-version, server-docker-build]
    permissions:
      contents: read
      packages: write
    if: needs.prepare-prerelease-version.outputs.version != ''
    runs-on: ubuntu-latest
    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create server manifest for multi-arch image
        run: |
          docker buildx imagetools create --tag ghcr.io/${{ github.repository }}-server:${{ needs.prepare-prerelease-version.outputs.version }} \
              ghcr.io/${{ github.repository }}-server:${{ needs.prepare-prerelease-version.outputs.version }}-linux-amd64 \
              ghcr.io/${{ github.repository }}-server:${{ needs.prepare-prerelease-version.outputs.version }}-linux-arm64

  analytics-docker-build:
    needs: [prepare-prerelease-version]
    permissions:
      contents: read
      packages: write
    if: needs.prepare-prerelease-version.outputs.version != ''
    strategy:
      max-parallel: 5
      matrix:
        include:
          - platform: linux/amd64
            tag: linux-amd64
            os: ubuntu-latest
          - platform: linux/arm64
            tag: linux-arm64
            os: ubuntu-24.04-arm
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-prerelease-version.outputs.build_sha }}
          fetch-depth: 0
          ssh-key: ${{ secrets.AIRBORNE_DEPLOY_KEY }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push analytics image
        uses: docker/build-push-action@v6
        with:
          push: true
          context: .
          file: airborne_analytics_server/Dockerfile
          tags: ghcr.io/${{ github.repository }}-analytics-server:${{ needs.prepare-prerelease-version.outputs.version }}-${{ matrix.tag }}

  analytics-create-manifest:
    needs: [prepare-prerelease-version, analytics-docker-build]
    permissions:
      contents: read
      packages: write
    if: needs.prepare-prerelease-version.outputs.version != ''
    runs-on: ubuntu-latest
    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create analytics manifest for multi-arch image
        run: |
          docker buildx imagetools create --tag ghcr.io/${{ github.repository }}-analytics-server:${{ needs.prepare-prerelease-version.outputs.version }} \
              ghcr.io/${{ github.repository }}-analytics-server:${{ needs.prepare-prerelease-version.outputs.version }}-linux-amd64 \
              ghcr.io/${{ github.repository }}-analytics-server:${{ needs.prepare-prerelease-version.outputs.version }}-linux-arm64

  dashboard-docker-build:
    needs: [prepare-prerelease-version]
    permissions:
      contents: read
      packages: write
    if: needs.prepare-prerelease-version.outputs.version != ''
    strategy:
      max-parallel: 5
      matrix:
        include:
          - platform: linux/amd64
            tag: linux-amd64
            os: ubuntu-latest
          - platform: linux/arm64
            tag: linux-arm64
            os: ubuntu-24.04-arm
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-prerelease-version.outputs.build_sha }}
          fetch-depth: 0
          ssh-key: ${{ secrets.AIRBORNE_DEPLOY_KEY }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push dashboard image
        uses: docker/build-push-action@v6
        with:
          push: true
          context: ./airborne_dashboard
          file: ./airborne_dashboard/Dockerfile
          tags: ghcr.io/${{ github.repository }}-dashboard:${{ needs.prepare-prerelease-version.outputs.version }}-${{ matrix.tag }}

  dashboard-create-manifest:
    needs: [prepare-prerelease-version, dashboard-docker-build]
    permissions:
      contents: read
      packages: write
    if: needs.prepare-prerelease-version.outputs.version != ''
    runs-on: ubuntu-latest
    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create dashboard manifest for multi-arch image
        run: |
          docker buildx imagetools create --tag ghcr.io/${{ github.repository }}-dashboard:${{ needs.prepare-prerelease-version.outputs.version }} \
              ghcr.io/${{ github.repository }}-dashboard:${{ needs.prepare-prerelease-version.outputs.version }}-linux-amd64 \
              ghcr.io/${{ github.repository }}-dashboard:${{ needs.prepare-prerelease-version.outputs.version }}-linux-arm64
